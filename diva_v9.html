
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1A1917;--ink2:#5F5E5A;--ink3:#9B9A95;
  --bg:#FAFAF8;--bg2:#F3F2EE;--bg3:#ECEAE3;
  --line:#E2E0D9;--line2:#D3D1C7;
  --blue:#1A5FA8;--blue-l:#EAF2FC;--blue-m:#B8D4F4;--blue-d:#0C3E72;
  --green:#2E6B16;--green-l:#EBF5E4;--green-m:#A8D98A;--green-d:#1A3E0B;
  --purple:#6B62CC;--purple-l:#EFEDFC;--purple-m:#C0BAEE;--purple-d:#3C356E;
  --teal:#0C6E57;--teal-l:#E2F5EF;--teal-m:#86CFBA;--teal-d:#063D30;
  --amber:#B87014;--amber-l:#FBF0E1;--amber-m:#F0C07A;--amber-d:#6B3E07;
  --red:#A33020;--red-l:#FBEAE7;--red-m:#F0A097;--red-d:#5C1A10;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:18px;
  --sh-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
}
body{background:var(--bg);font-family:var(--font-sans),-apple-system,system-ui,sans-serif;color:var(--ink)}
.app{max-width:680px;margin:0 auto;padding:.75rem .75rem 4rem}
.topbar{background:#fff;border:.5px solid var(--line);border-radius:var(--r-xl);padding:1.125rem 1.375rem;margin-bottom:.75rem;box-shadow:var(--sh-sm)}
.topbar-inner{display:flex;align-items:flex-start;gap:.875rem}
.brand-dot{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--blue) 0%,var(--purple) 100%);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 6px rgba(26,95,168,.25)}
.topbar h1{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:2px;letter-spacing:-.01em}
.topbar p{font-size:11.5px;color:var(--ink3);line-height:1.55}
.pb-wrap{margin-top:.75rem;display:flex;align-items:center;gap:.625rem}
.pb{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.pbf{height:100%;border-radius:2px;transition:width .4s ease,background .4s ease}
.pb-pct{font-size:10px;font-weight:500;color:var(--ink3);min-width:26px;text-align:right}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:.75rem}
.tab{padding:6px 4px;font-size:10.5px;font-weight:500;border-radius:var(--r-md);border:1.5px solid var(--line);cursor:pointer;text-align:center;transition:all .15s;background:#fff;color:var(--ink2);line-height:1.3}
.tab:hover{background:var(--bg2);border-color:var(--line2)}
.tab-num{display:block;font-size:9px;color:var(--ink3);margin-bottom:2px;font-weight:400}
.t0.active{background:var(--blue-l);color:var(--blue-d);border-color:var(--blue)}
.t1.active{background:var(--green-l);color:var(--green-d);border-color:var(--green)}
.t2.active{background:#FFF5F0;color:#7A3300;border-color:#FFBFA0}
.t3.active{background:var(--purple-l);color:var(--purple-d);border-color:var(--purple)}
.t4.active{background:var(--purple-l);color:var(--purple-d);border-color:var(--purple)}
.t5.active{background:var(--teal-l);color:var(--teal-d);border-color:var(--teal)}
.t6.active{background:var(--teal-l);color:var(--teal-d);border-color:var(--teal)}
.t7.active{background:var(--amber-l);color:var(--amber-d);border-color:var(--amber)}
.t8.active{background:var(--amber-l);color:var(--amber-d);border-color:var(--amber)}
.t9.active{background:#F0F8FF;color:#0C3E72;border-color:#90BEF0}
.t10.active{background:var(--blue-l);color:var(--blue-d);border-color:var(--blue)}
.card{background:#fff;border:.5px solid var(--line);border-radius:var(--r-lg);margin-bottom:.75rem;overflow:hidden;box-shadow:var(--sh-sm)}
.card-head{padding:1rem 1.375rem;border-bottom:.5px solid var(--line)}
.card-head h2{font-size:14px;font-weight:600;color:var(--ink);letter-spacing:-.01em}
.card-head p{font-size:12px;color:var(--ink2);margin-top:4px;line-height:1.55}
.card-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;margin-bottom:5px}
.notice{padding:.625rem 1rem;border-left:3px solid var(--blue);background:var(--blue-l);margin:.875rem 1.375rem;border-radius:0 var(--r-sm) var(--r-sm) 0;font-size:12px;color:var(--blue-d);line-height:1.6}
.notice.gn{border-color:var(--green);background:var(--green-l);color:var(--green-d)}
.qw{border-bottom:.5px solid var(--line)}
.qw:last-child{border-bottom:none}
.qi{padding:1rem 1.375rem}
.qnum{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:700;margin-right:7px;flex-shrink:0;vertical-align:middle}
.qlbl{font-size:13px;font-weight:500;color:var(--ink);line-height:1.6;margin-bottom:10px}
.sr{display:flex;gap:5px;margin-bottom:11px}
.sc{flex:1;padding:9px 4px 7px;border:1.5px solid var(--line);border-radius:var(--r-sm);background:#fff;cursor:pointer;font-size:9.5px;text-align:center;transition:all .15s;color:var(--ink2);line-height:1.3;user-select:none}
.sc:hover{border-color:var(--line2);background:var(--bg)}
.sc strong{display:block;font-size:16px;font-weight:600;margin-bottom:2px}
.s0{background:#F5F4F1;border-color:#C9C7BE;color:#5F5E5A}.s0 strong{color:#2C2C2A}
.s1{background:#EAF2FC;border-color:#90BEF0;color:var(--blue-d)}.s1 strong{color:var(--blue-d)}
.s2{background:#FBF0E1;border-color:#E8B86A;color:var(--amber-d)}.s2 strong{color:var(--amber-d)}
.s3{background:#FBEAE7;border-color:#E89088;color:var(--red-d)}.s3 strong{color:var(--red-d)}
.exl{display:grid;gap:3px;margin-bottom:9px;padding:8px 10px;background:var(--bg2);border-radius:var(--r-sm);border:.5px solid var(--line)}
.exi{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--ink2);line-height:1.5;cursor:pointer;padding:2px 0}
.exi input{margin-top:2px;flex-shrink:0;accent-color:var(--blue);width:13px;height:13px}
.cw{background:var(--bg2);border-radius:var(--r-sm);padding:.625rem .875rem;border:.5px solid var(--line)}
.cw-hdr{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.cw-lbl{font-size:10.5px;color:var(--ink3);font-weight:500}
textarea.cta{width:100%;border:.5px solid var(--line);border-radius:var(--r-sm);padding:7px 9px;font-size:12px;color:var(--ink);background:#fff;resize:vertical;min-height:40px;font-family:inherit;line-height:1.5}
textarea.cta::placeholder{color:var(--ink3);opacity:.8}
textarea.cta:focus{outline:none;border-color:var(--blue-m)}
.supp{margin:.875rem 1.375rem;border:1.5px solid var(--purple-m);border-radius:var(--r-md);overflow:hidden}
.supp-h{background:var(--purple-l);padding:.5rem .875rem;font-size:11px;font-weight:600;color:var(--purple-d)}
.supp-b{padding:.625rem .875rem}
.supp-q{font-size:12px;color:var(--ink);margin-bottom:6px;line-height:1.55}
.supp-opts{display:flex;gap:14px}
.supp-opts label{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--ink);cursor:pointer}
.supp-opts input{accent-color:var(--purple)}
/* ASRS */
.asrs-wrap{background:#fff;border:.5px solid var(--line);border-radius:var(--r-lg);margin-bottom:.75rem;overflow:hidden;box-shadow:var(--sh-sm)}
.asrs-head{background:linear-gradient(135deg,#FFF5F0 0%,#FFF0F8 100%);padding:1.125rem 1.375rem;border-bottom:.5px solid #FFD5C0}
.asrs-badge{display:inline-flex;align-items:center;gap:4px;background:#E8540A;color:#fff;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.04em;margin-bottom:6px}
.asrs-head h2{font-size:14px;font-weight:600;color:#5C1F00;letter-spacing:-.01em}
.asrs-head p{font-size:11.5px;color:#9B4B20;line-height:1.55;margin-top:3px}
.asrs-qw{border-bottom:.5px solid #FFE8D8}
.asrs-qw:last-child{border-bottom:none}
.asrs-qi{padding:1.125rem 1.375rem}
.asrs-ql{font-size:13px;font-weight:500;color:var(--ink);line-height:1.6;margin-bottom:10px}
.asrs-qn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#E8540A;color:#fff;font-size:10px;font-weight:700;margin-right:7px;flex-shrink:0;vertical-align:middle}
.asrs-sr{display:flex;gap:5px}
.asrs-sc{flex:1;padding:9px 3px 7px;border:1.5px solid var(--line);border-radius:var(--r-sm);background:#fff;cursor:pointer;font-size:9.5px;text-align:center;transition:all .15s;color:var(--ink2);line-height:1.3;user-select:none}
.asrs-sc:hover{background:var(--bg)}
.asrs-sc strong{display:block;font-size:15px;font-weight:600;margin-bottom:2px}
.av0{background:#F5F4F1;border-color:#B4B2A9;color:#5F5E5A}.av0 strong{color:#2C2C2A}
.av1{background:#F0FBE8;border-color:#8CC96A;color:#1A3E0B}.av1 strong{color:#1A3E0B}
.av2{background:#FFF0E8;border-color:#FFAA80;color:#7A3300}.av2 strong{color:#7A3300}
.av3{background:#FFE8D8;border-color:#FF7043;color:#5C1F00}.av3 strong{color:#5C1F00}
.av4{background:#FFDFD0;border-color:#E84B1A;color:#4A0E00}.av4 strong{color:#4A0E00}
.asrs-result-area{padding:.875rem 1.375rem;background:#FFFAF7;border-top:.5px solid #FFE0D0}
/* FORM */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:1rem 1.375rem}
.fi{display:flex;flex-direction:column;gap:4px}
.fi label{font-size:11.5px;color:var(--ink2);font-weight:500}
.fi input{border:.5px solid var(--line);border-radius:var(--r-sm);padding:7px 10px;font-size:13px;color:var(--ink);background:#fff;font-family:inherit}
.fi input:focus{outline:none;border-color:var(--blue-m)}
.ff{grid-column:1/-1}
.rg,.cg{display:flex;flex-wrap:wrap;gap:6px 16px;margin-top:5px}
.ri,.ci{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink);cursor:pointer}
.ri input,.ci input{accent-color:var(--blue);width:14px;height:14px}
/* ID CARD */
.id-card{background:linear-gradient(135deg,#1A3A6E 0%,#2A5BB8 50%,#5552C8 100%);border-radius:var(--r-xl);padding:1.125rem 1.375rem;margin-bottom:.75rem;box-shadow:var(--sh-md);position:relative;overflow:hidden}
.id-card::before{content:'';position:absolute;top:-30px;right:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.06)}
.id-top{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem}
.id-icon{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.id-card h3{font-size:14px;font-weight:600;color:#fff}
.id-card p{font-size:11.5px;color:rgba(255,255,255,.75);line-height:1.55}
.id-input-row{display:flex;gap:8px;align-items:center;margin-top:.625rem;position:relative;z-index:1}
.id-input{flex:1;border:1.5px solid rgba(255,255,255,.35);border-radius:var(--r-sm);padding:9px 13px;font-size:15px;font-weight:600;color:#fff;background:rgba(255,255,255,.12);font-family:inherit;letter-spacing:.05em}
.id-input::placeholder{font-weight:400;font-size:13px;letter-spacing:0;color:rgba(255,255,255,.5)}
.id-input:focus{outline:none;border-color:rgba(255,255,255,.7);background:rgba(255,255,255,.18)}
.id-tip{font-size:10.5px;color:rgba(255,255,255,.65);margin-top:.5rem;position:relative;z-index:1;display:flex;align-items:center;gap:4px}
/* COMPLAINTS */
.comp-grid{display:grid;gap:9px;padding:1rem 1.375rem}
.comp-row{display:flex;align-items:flex-start;gap:9px}
.comp-num{width:26px;height:26px;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:6px}
.cn1{background:var(--blue-l);color:var(--blue-d)}.cn2{background:var(--green-l);color:var(--green-d)}.cn3{background:var(--bg3);color:var(--ink2)}
.comp-inp{flex:1;border:.5px solid var(--line);border-radius:var(--r-sm);padding:8px 11px;font-size:13px;color:var(--ink);background:#fff;font-family:inherit}
.comp-inp:focus{outline:none;border-color:var(--blue-m)}
.comp-hint{font-size:11px;color:var(--ink3);padding:0 1.375rem .875rem;line-height:1.5}
/* IMPAIRMENT */
.dom-block{padding:1rem 1.375rem;border-bottom:.5px solid var(--line)}
.dom-block:last-of-type{border-bottom:none}
.dom-title-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.dom-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.dom-title{font-size:13px;font-weight:600;color:var(--ink)}
.dom-items{display:grid;gap:4px;margin-bottom:8px}
.dom-item{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--ink2);line-height:1.5;cursor:pointer;padding:2px 0}
.dom-item input{margin-top:2px;flex-shrink:0;accent-color:var(--blue);width:13px;height:13px}
/* 해당없음 — 항목 목록 아래, 사례 입력란 위 */
.none-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#fff;border-radius:var(--r-sm);border:1.5px dashed var(--line2);margin-bottom:9px;cursor:pointer;transition:all .15s}
.none-row:hover{background:var(--bg2);border-color:var(--ink3)}
.none-row.checked{background:#F5F4F1;border-color:var(--ink2);border-style:solid}
.none-row input{flex-shrink:0;accent-color:var(--ink2);width:13px;height:13px}
.none-row span{font-size:12px;color:var(--ink2);font-weight:500}
/* DIFF */
.diff-block{padding:1rem 1.375rem;border-bottom:.5px solid var(--line)}
.diff-block:last-of-type{border-bottom:none}
.diff-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:4px}
.diff-desc{font-size:11.5px;color:var(--ink2);line-height:1.55;margin-bottom:8px;padding:.5rem .75rem;background:var(--bg2);border-radius:var(--r-sm);border:.5px solid var(--line)}
.diff-items{display:grid;gap:3px;margin-bottom:8px}
.diff-item{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--ink2);line-height:1.45;cursor:pointer;padding:1px 0}
.diff-item input{margin-top:2px;flex-shrink:0;accent-color:var(--blue);width:13px;height:13px}
.diff-none{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#fff;border-radius:var(--r-sm);border:1.5px dashed var(--line2);margin-bottom:7px;cursor:pointer;transition:all .15s}
.diff-none:hover{background:var(--bg2);border-color:var(--ink3)}
.diff-none.checked{background:#F5F4F1;border-color:var(--ink2);border-style:solid}
.diff-none input{flex-shrink:0;accent-color:var(--ink2);width:13px;height:13px}
.diff-none span{font-size:12px;color:var(--ink2);font-weight:500}
.diff-when{font-size:11px;color:var(--ink3);margin-bottom:3px}
.diff-inp{width:100%;border:.5px solid var(--line);border-radius:var(--r-sm);padding:6px 9px;font-size:12px;color:var(--ink);background:#fff;font-family:inherit}
.diff-inp:focus{outline:none;border-color:var(--blue-m)}
/* ONSET */
.onset-block{padding:1rem 1.375rem;border-bottom:.5px solid var(--line)}
.onset-block:last-of-type{border-bottom:none}
.onset-q{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:8px;line-height:1.55}
/* NAV */
.bot{display:flex;align-items:center;justify-content:space-between;margin-top:.75rem;padding-bottom:1.25rem}
.btn{padding:9px 20px;border-radius:var(--r-md);font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--line2);background:#fff;color:var(--ink);transition:all .15s}
.btn:hover{background:var(--bg2)}
.btnp{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 2px 8px rgba(26,95,168,.25)}
.btnp:hover{background:var(--blue-d);border-color:var(--blue-d)}
.plbl{font-size:11px;color:var(--ink3);font-weight:500}
/* REPORT */
.rpt{font-family:inherit;color:var(--ink)}
.rpt-top{background:linear-gradient(135deg,#0D2547 0%,#1A5FA8 55%,#4B47B8 100%);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:1.375rem 1.5rem;color:#fff;position:relative;overflow:hidden}
.rpt-top::before{content:'';position:absolute;top:-40px;right:-30px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.06)}
.rpt-title{font-size:17px;font-weight:700;margin-bottom:3px;letter-spacing:-.02em;position:relative;z-index:1}
.rpt-sub{font-size:11px;opacity:.75;margin-bottom:.875rem;position:relative;z-index:1}
.rpt-meta{display:flex;gap:10px;flex-wrap:wrap;position:relative;z-index:1}
.rmi{font-size:11px;opacity:.8;display:flex;align-items:center;gap:4px}
.rpt-id-box{display:inline-flex;align-items:center;gap:12px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:var(--r-md);padding:6px 14px;margin-top:.75rem;position:relative;z-index:1}
.rpt-id-lbl{font-size:9.5px;opacity:.75;letter-spacing:.05em;text-transform:uppercase}
.rpt-id-val{font-size:17px;font-weight:700;letter-spacing:.1em}
.rpt-fname{border-left:1px solid rgba(255,255,255,.25);padding-left:12px}
.fname-val{font-size:12px;font-weight:500;letter-spacing:.03em;color:rgba(255,255,255,.9)}
.rpt-body{padding:1rem 1.25rem;display:grid;gap:.875rem;background:var(--bg)}
.rpt-sec{border:.5px solid var(--line);border-radius:var(--r-md);overflow:hidden;background:#fff;box-shadow:var(--sh-sm)}
.rsh{padding:.5rem .875rem;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;display:flex;align-items:center;gap:6px;border-bottom:.5px solid var(--line)}
.rsb{padding:.75rem .875rem}
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.scc{padding:.625rem .875rem;border-radius:var(--r-sm);border:.5px solid}
.scc-l{font-size:10px;color:var(--ink2);margin-bottom:2px}
.scc-v{font-size:22px;font-weight:700;line-height:1}
.scc-s{font-size:10px;margin-top:3px}
.cr-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:.5px solid var(--line)}
.cr-row:last-child{border-bottom:none}
.crl{flex:1;color:var(--ink2);font-size:11px}
.cbadge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.bok{background:var(--green-l);color:var(--green-d);border:.5px solid var(--green-m)}
.balert{background:var(--red-l);color:var(--red-d);border:.5px solid var(--red-m)}
.bneu{background:var(--bg3);color:var(--ink2);border:.5px solid var(--line2)}
.bwarn{background:var(--amber-l);color:var(--amber-d);border:.5px solid var(--amber-m)}
.dot{width:18px;height:18px;border-radius:4px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}
.d0{background:#E8E6DF;color:#5F5E5A}.d1{background:#90BEF0;color:#0C3E72}
.d2{background:#E8B86A;color:#4A2A00}.d3{background:#E08078;color:#fff}
.dn{background:var(--bg3);color:var(--ink3)}
.drow{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.ex-tag{background:var(--bg2);border:.5px solid var(--line2);border-radius:var(--r-sm);padding:2px 7px;font-size:11px;color:var(--ink2);line-height:1.4}
.case-note{background:var(--bg2);border-left:2.5px solid var(--line2);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:4px 9px;font-size:11px;color:var(--ink2);margin-top:4px;line-height:1.5;font-style:italic}
.imp5{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.imc{padding:5px 3px;border-radius:var(--r-sm);text-align:center;border:.5px solid}
.imc-l{font-size:8.5px;line-height:1.3;margin-bottom:2px}
.imc-v{font-size:14px;font-weight:700}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:9px 20px;border-radius:20px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none;box-shadow:var(--sh-md)}

@media print{.topbar,.tabs,.bot,.action-row,.toast,.fname-hint{display:none!important}.app{padding:0;max-width:none}.rpt-body{background:#fff}}

}

// ── REPORT ──────────────────────────────────────────────────
function buildReport(){
  const aA=cntP(DA),aH=cntP(DH),cA=cntP(CA),cH=cntP(CH);

  const adImpCnt=adDoms.filter(d=>(IN[d]||[]).some(Boolean)).length;
  const chImpCnt=chDoms.filter(d=>(IN[d]||[]).some(Boolean)).length;
  const uid=IN.uid||'(미기재)';
  const asrsPos=asrsScore(),asrsTot=asrsTotal();
  const fname=getFilename();
  let sub='기준 미충족',subCol='var(--ink2)';
  if(aAmet&&aHmet){sub='복합형 (Combined)';subCol='var(--red-d)';}
  else if(aAmet){sub='주의력결핍 우세형';subCol='var(--blue-d)';}
  else if(aHmet){sub='과잉행동·충동성 우세형';subCol='var(--purple-d)';}
  if (!buildReport._saved) {
    buildReport._saved = true;
    saveTestResult('DIVA', asrsTot, sub);
  }
  function cbadge(met,t){if(met===true)return `<span class="cbadge bok"><i class="ti ti-check" style="font-size:10px"></i>${t}</span>`;if(met===false)return `<span class="cbadge balert"><i class="ti ti-x" style="font-size:10px"></i>${t}</span>`;return `<span class="cbadge bneu">${t}</span>`;}
  const clinItems=[];
  if(aAmet&&aHmet)clinItems.push({t:'main',s:`성인기 주의력결핍(${aA}/9)과 과잉행동·충동성(${aH}/9) 모두 DSM-5 성인 기준(≥5개)을 충족합니다. 복합형 가능성이 시사됩니다.`});
  else if(aAmet)clinItems.push({t:'main',s:`성인기 주의력결핍(${aA}/9)이 DSM-5 기준(≥5개)을 충족합니다.`});
  else if(aHmet)clinItems.push({t:'main',s:`성인기 과잉행동·충동성(${aH}/9)이 DSM-5 기준(≥5개)을 충족합니다.`});
  else clinItems.push({t:'warn',s:`성인기 증상이 DSM-5 기준에 미치지 못합니다 (주의력결핍 ${aA}/9, 과잉행동·충동성 ${aH}/9). 임상 면담에서 추가 확인이 필요합니다.`});
  if(asrsPos>=4)clinItems.push({t:'main',s:`ASRS Part A 양성 (음영 응답 ${asrsPos}/6, 총점 ${asrsTot}/20). 건강보험 청구 기준을 충족합니다.`});
  else clinItems.push({t:'warn',s:`ASRS Part A 음성 (음영 응답 ${asrsPos}/6, 총점 ${asrsTot}/20). 양성 기준 미충족 — 임상 판단 필요.`});
  if(cAmet||cHmet)clinItems.push({t:'main',s:`아동기 증상(주의력결핍 ${cA}/9, 과잉행동·충동성 ${cH}/9)이 아동기 기준(≥6개)을 충족합니다.`});
  else clinItems.push({t:'warn',s:`아동기 증상 기준 미충족 (주의력결핍 ${cA}/9, 과잉행동·충동성 ${cH}/9). 기억 제한 또는 보호자 정보 부재 가능성을 고려해주세요.`});
  if(onset12&&persist)clinItems.push({t:'main',s:'12세 이전 시작 및 성인기까지 지속이 보고되어 DSM-5 기준 B를 지지합니다.'});
  else if(!onset12)clinItems.push({t:'warn',s:'12세 이전 시작 여부가 불명확합니다. 부모·보호자 면담 또는 과거 기록 확인을 권장합니다.'});
  if(adImpCnt>=2)clinItems.push({t:'main',s:`성인기 기능 손상이 ${adImpCnt}개 영역에서 보고되어 DSM-5 기준 C/D를 충족합니다.`});
  else clinItems.push({t:'warn',s:`성인기 기능 손상 ${adImpCnt}개 영역 — 기준 C/D는 2개 이상 영역의 손상을 요구합니다.`});
  const diffMeta=[{id:'sleep',lbl:'수면 문제',note:'수면장애는 집중력 저하·충동성 증가의 독립적 원인이 될 수 있습니다.'},{id:'dep',lbl:'우울 증상',note:'우울 삽화에서도 집중력 저하·무기력·실행기능 저하가 나타나 ADHD와 유사할 수 있습니다.'},{id:'anx',lbl:'불안 증상',note:'불안장애는 과제 회피·집중 저하를 유발할 수 있습니다.'},{id:'bp',lbl:'양극성 관련',note:'경조증·조증 삽화의 과활동·충동성은 ADHD와 현상학적으로 유사합니다. 삽화 기간을 확인해주세요.'},{id:'sub',lbl:'물질/행동 조절',note:'물질 사용 및 행동 중독은 ADHD 증상을 악화시키거나 모방할 수 있습니다.'}].filter(f=>(IN[f.id]||[]).some(Boolean));

  const fullCrit=(aAmet||aHmet)&&onset12&&persist&&adImpCnt>=2;

  if(fullCrit)clinItems.push({t:'sum',s:'자가보고 기준으로 DSM-5 주요 진단 기준(A·B·C/D)을 충족할 가능성이 있습니다. 임상 면담을 통한 최종 확인이 필요합니다.'});
  else if(partCrit)clinItems.push({t:'sum',s:'성인기 증상과 기능 손상은 확인되었으나, 발달력(12세 이전 시작·지속성) 추가 확인이 필요합니다.'});
  else clinItems.push({t:'sum',s:'현재 자가보고만으로는 기준 충족 여부를 확정하기 어렵습니다. 임상 면담에서 구체적인 평가가 필요합니다.'});
  function dotRow(arr){return arr.map(q=>{const v=SC[q.id];const c=v===0?'d0':v===1?'d1':v===2?'d2':v===3?'d3':'dn';return `<div class="dot ${c}">${v==null?'–':v}</div>`;}).join('');}
  function symRows(arr){return arr.filter(q=>SC[q.id]>=2).map(q=>{const v=SC[q.id];const tags=q.ex.filter((_,i)=>(EX[q.id]||[])[i]).map(e=>`<span class="ex-tag">${e}</span>`).join('');const note=CS[q.id]?`<div class="case-note">${CS[q.id]}</div>`:'';return `<div style="padding:5px 0;border-bottom:.5px solid var(--line)"><div style="display:flex;gap:8px;align-items:flex-start"><div class="dot d${v}" style="flex-shrink:0;margin-top:1px">${v}</div><div style="flex:1"><div style="font-size:11px;font-weight:500;color:var(--ink);line-height:1.4;margin-bottom:3px">${q.lbl}</div>${tags?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:3px">${tags}</div>`:''}${note}</div></div></div>`;}).join('');}
  const impDD=[{id:'aw',lbl:'직업/학업',items:['교육 과정 수료 어려움','능력 대비 낮은 성취','싫증','직장·전공 변경 욕구','행정·계획 어려움','실수·지각·마감','외부 장치 의존','임기응변으로 가림']},{id:'af',lbl:'대인관계/가정',items:['관계 싫증','충동적 관계','역할 불균형','반복 갈등','집안일 어려움','재정 문제']},{id:'as',lbl:'사회적 교류',items:['모임 싫증','관계 유지 어려움','말실수·갈등','기념일·연락 망각']},{id:'al',lbl:'여가/취미',items:['여가에도 못 쉼','취미 잦은 변경','완주 어려움','위험 감수','운전 문제','폭식·과소비']},{id:'ac',lbl:'자신감/자아상',items:['자신감 저하','부정적 자아상','비판 과민','완벽주의']}];

  function impRowRpt(dd){return dd.map(d=>{if(IN['none_'+d.id])return `<div style="padding:4px 0;border-bottom:.5px solid var(--line)"><span style="font-size:10px;font-weight:600;color:var(--ink3)">${d.lbl}</span> <span style="font-size:10px;color:var(--ink3);font-style:italic">— 해당없음</span></div>`;const ci=d.items.filter((_,i)=>(IN[d.id]||[])[i]);const note=CS['i_'+d.id];if(!ci.length&&!note)return '';return `<div style="padding:4px 0;border-bottom:.5px solid var(--line)"><div style="font-size:10px;font-weight:600;color:var(--ink2);margin-bottom:3px">${d.lbl}</div><div style="display:flex;flex-wrap:wrap;gap:3px">${ci.map(it=>`<span class="ex-tag">${it}</span>`).join('')}</div>${note?`<div class="case-note">${note}</div>`:''}</div>`;}).join('');}

  return `<div class="rpt">

  <div class="rpt-sub">DIVA 2.0 기반 자가보고 · 진료 보조 자료 · 어떠한 개인정보도 서버에 저장되지 않습니다</div>

function printWithCopy(){
  const fname=getFilename();
  navigator.clipboard.writeText(fname).then(()=>{
    showToast(`파일명 "${fname}" 복사됨 — 저장창에서 Ctrl+V`,3000);
    setTimeout(()=>{const orig=document.title;document.title=fname;window.print();setTimeout(()=>{document.title=orig;},1500);},300);
  }).catch(()=>{
    const orig=document.title;document.title=fname;window.print();setTimeout(()=>{document.title=orig;},1500);
  });
}

function copyReport(){
  const aA=cntP(DA),aH=cntP(DH),cA=cntP(CA),cH=cntP(CH);const ap=asrsScore(),at=asrsTotal();
  const lines=['═══════════════════════════════','ADHD 사전 평가 결과 보고서','═══════════════════════════════',`아이디: ${IN.uid||'미기재'}  ·  ${TODAY}`,`파일명: ${getFilename()}`,'',`ASRS Part A: ${ap}/6 (총점 ${at}/20) → ${ap>=4?'양성':'음성'}`,`성인기 주의력결핍: ${aA}/9 ${aA>=5?'[충족]':'[미충족]'}`,`성인기 과잉행동·충동성: ${aH}/9 ${aH>=5?'[충족]':'[미충족]'}`,`아동기 주의력결핍: ${cA}/9 ${cA>=6?'[충족]':'[미충족]'}`,`아동기 과잉행동·충동성: ${cH}/9 ${cH>=6?'[충족]':'[미충족]'}`,'',`시작 시기: ${IN.on1||'미기재'}  ·  12세 이전: ${IN.on2||'미기재'}  ·  지속: ${IN.on3||'미기재'}`];
  navigator.clipboard.writeText(lines.join('\n')).then(()=>showToast('클립보드에 복사되었습니다')).catch(()=>showToast('복사 실패'));
}

function buildPage(k){

  if(k==='diff') return `<div class="card"><div class="card-head"><span class="card-pill" style="background:var(--red-l);color:var(--red-d)"><i class="ti ti-stethoscope" style="font-size:11px"></i>감별진단</span><h2>감별진단 및 동반 문제 확인</h2><p>각 항목의 내용을 읽어보신 후, 해당되는 증상이 있을 때만 체크해주세요. 없으면 "해당 없음"을 선택해주세요.</p></div>${mkDiff('수면 문제','수면 상태를 확인하기 위한 항목입니다. 잠을 잘 못 자거나 수면 리듬이 불규칙하면 집중력 저하와 충동성이 심해질 수 있습니다.','sleep',['잠드는 시간이 매우 늦거나 수면 패턴이 불규칙하다.','수면 시간이 부족하다. (6시간 이하인 날이 많다)','밤에 자주 깨거나 깊게 잠들지 못한다.','낮에 졸림이 심해 일상생활이 힘들다.','코골이 또는 수면 중 숨이 막히는 것 같다는 말을 들어본 적 있다.','교대근무, 밤샘 등 불규칙한 생활 패턴이 있다.'])}${mkDiff('우울 증상','우울 증상이 있으면 집중력이 떨어지고, 무기력함·미루기·의욕 저하가 ADHD처럼 보일 수 있습니다.','dep',['의욕이 뚜렷하게 떨어지거나, 아무것도 하기 싫다는 느낌이 든다.','예전에는 좋아했던 것들이 더 이상 즐겁지 않다.','이유 없이 몸이 무겁고 피로하다.','나 자신을 자책하거나 쓸모없다는 생각이 자주 든다.','생각이 느려지거나 집중이 잘 안 된다.','죽고 싶다는 생각, 또는 사라지고 싶다는 생각이 든 적이 있다.'])}${mkDiff('불안 증상','불안이 심하면 집중하기 어렵고, 실수가 두려워 시작을 못 하거나 일을 미루는 패턴이 생길 수 있습니다.','anx',['걱정이 너무 많아서 집중하기가 어렵다.','긴장감, 예민함, 초조함이 일상적으로 심하다.','실수할까 봐 두려워서 일을 시작하지 못한다.','불안 때문에 해야 할 일을 자꾸 미루게 된다.','갑자기 심장이 두근거리고 숨이 막히는 느낌이 든 적이 있다.','사람들 앞에서 평가받는 상황이 매우 힘들다.'])}${mkDiff('양극성 관련 증상','조증·경조증 삽화는 ADHD와 겹치는 증상이 많아 감별이 필요합니다. 다음과 같은 시기가 있었다면 체크해주세요.','bp',['잠을 평소보다 훨씬 적게 자도 피곤하지 않고 에너지가 넘쳤던 시기가 있었다.','평소보다 말이 많아지고 생각이 너무 빨리 돌아갔던 시기가 있었다.','자신감이 과도하게 높아지거나, 무리한 계획을 잔뜩 세웠던 시기가 있었다.','과소비, 충동적 결정, 위험한 행동이 갑자기 늘었던 시기가 있었다.'])}${mkDiff('물질 사용 및 행동 조절 문제','카페인, 알코올, 게임, SNS 등 특정 물질이나 행동에 과도하게 의존하면 주의력과 충동 조절에 영향을 줄 수 있습니다.','sub',['술을 마시면 멈추기가 어렵거나, 자신도 모르게 많이 마신다.','카페인, 에너지드링크, 담배 등을 하루에 많이 사용한다.','게임, 쇼츠, SNS, 쇼핑 등을 조절하기 어렵다는 느낌이 든다.','폭식을 하거나 먹는 것을 충동적으로 조절하기 어렵다.'])}<div class="diff-block"><div class="diff-title">의학적 요인 및 복용 약물</div><div class="diff-desc">신체 질환이나 복용 중인 약물이 집중력·피로감·기억력에 영향을 줄 수 있습니다.</div><div class="cg" style="margin-bottom:8px">${['갑상선 질환','빈혈','만성피로','수면장애','뇌진탕/두부외상','해당 없음'].map((v,i)=>`<label class="ci"><input type="checkbox" onchange="toggleCb('medC',${i},this.checked)" ${(IN.medC||[])[i]?'checked':''}> ${v}</label>`).join('')}</div><div class="diff-when" style="margin-bottom:3px">현재 복용 중인 약물 (없으면 비워두세요)</div><input class="diff-inp" type="text" placeholder="없음, 또는 약물명 기재" oninput="IN.meds=this.value" value="${IN.meds||''}"></div></div>`;
  if(k==='sum') return buildReport();
  return '';
}

function render(){
  document.getElementById('pages').innerHTML=buildPage(PKEYS[cur]);
  const pct=Math.round(cur/(PKEYS.length-1)*100);
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pf').style.background=TCOLS[cur];
  document.getElementById('pct').textContent=pct+'%';
  document.getElementById('plbl').textContent=`${cur+1} / ${PKEYS.length}`;
  document.getElementById('bP').style.visibility=cur===0?'hidden':'visible';
  document.getElementById('bN').textContent=cur===PKEYS.length-1?'완료':'다음 →';
  document.getElementById('tabs').innerHTML=PKEYS.map((k,i)=>`<button class="tab t${i}${i===cur?' active':''}" onclick="goTo(${i})"><span class="tab-num">${i+1}</span>${TNAMES[i]}</button>`).join('');
}
function nav(d){const n=cur+d;if(n<0||n>=PKEYS.length)return;cur=n;render();document.getElementById('app').scrollIntoView({behavior:'smooth'});}
function goTo(i){cur=i;render();document.getElementById('app').scrollIntoView({behavior:'smooth'});}
render();
</script>
