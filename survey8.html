<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정신건강 사전 설문 — 아동기 외상·성향 (CTQ-SF / WURS-25)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap');
:root{
  --bg:#F7F6F3;--sf:#fff;--s2:#F0EEE9;--bd:#DDD9D0;
  --t1:#1A1916;--t2:#6B6860;--tm:#9E9B94;
  --ac:#3D6B58;--al:#EAF2EE;--ah:#2D5244;
  --wn:#C45E2E;--wl:#FBF0EB;
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;line-height:1.7;font-size:15px}
.shell{max-width:620px;margin:0 auto;padding:0 16px 100px}
.hdr{padding:18px 0 14px;border-bottom:1px solid var(--bd);margin-bottom:18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;background:var(--bg);z-index:50}
.hdr-mk{width:30px;height:30px;background:var(--ac);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-mk svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2}
.hdr h1{font-family:'Noto Serif KR',serif;font-size:14px;font-weight:700}
.hdr p{font-size:11px;color:var(--tm)}
.prog{margin-bottom:18px}
.prog-row{display:flex;justify-content:space-between;margin-bottom:5px}
.prog-lbl{font-size:11.5px;color:var(--t2);font-weight:500}
.prog-fr{font-size:11.5px;color:var(--tm)}
.prog-tr{height:3px;background:#E0DDD6;border-radius:2px;overflow:hidden}
.prog-fi{height:100%;background:var(--ac);border-radius:2px;transition:width .45s cubic-bezier(.4,0,.2,1)}
.sec-hdr{background:var(--sf);border-radius:var(--r);border:1px solid var(--bd);padding:18px 18px 16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ac);margin-bottom:3px}
.sec-title{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;line-height:1.4;margin-bottom:4px;letter-spacing:-.4px}
.sec-desc{font-size:12.5px;color:var(--t2);line-height:1.7;border-left:3px solid var(--bd);padding-left:9px}
.guide-box{background:var(--s2);border-radius:var(--rs);padding:9px 12px;margin-top:10px;font-size:12px;color:var(--t2);line-height:1.85}
.guide-box strong{color:var(--t1)}
.q-card{background:var(--sf);border-radius:var(--r);border:1px solid var(--bd);padding:20px 18px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:all .22s ease}
.q-card.active{animation:qIn .28s cubic-bezier(.22,.68,0,1.15) forwards}
@keyframes qIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.q-card.done{padding:9px 14px;background:var(--s2);border-color:transparent;box-shadow:none;cursor:default}
.q-card.future{display:none}
.done-row{display:flex;align-items:center;gap:8px;min-width:0}
.done-num{font-size:11px;color:var(--tm);flex-shrink:0;min-width:22px}
.done-q{font-size:12.5px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.done-a{font-size:12.5px;font-weight:600;color:var(--ac);flex-shrink:0;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.edit-btn{font-size:11px;color:var(--tm);cursor:pointer;padding:2px 7px;border-radius:4px;border:1px solid var(--bd);background:var(--sf);flex-shrink:0;transition:all .12s}
.edit-btn:hover{color:var(--ac);border-color:var(--ac)}
.q-lbl{font-size:14px;font-weight:500;line-height:1.65;margin-bottom:11px;color:var(--t1)}
.q-num{display:inline;font-size:11.5px;font-weight:700;color:var(--tm);margin-right:4px}
/* 5-point (CTQ) */
.rg{display:flex;flex-direction:column;gap:6px}
.ro{display:flex;align-items:center;gap:9px;padding:10px 12px;border:1.5px solid var(--bd);border-radius:var(--rs);cursor:pointer;font-size:13px;color:var(--t2);user-select:none;transition:all .13s}
.ro:hover{border-color:var(--ac);background:var(--al)}
.ro.sel{border-color:var(--ac);background:var(--al);color:var(--ac);font-weight:500}
.rdot{width:15px;height:15px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ro.sel .rdot{border-color:var(--ac)}
.rdi{width:7px;height:7px;border-radius:50%;background:var(--ac);opacity:0}
.ro.sel .rdi{opacity:1}
/* 5-point likert (CTQ) and 5-point likert (childhood temperament) */
.lg5{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.lo{display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px 7px;border:1.5px solid var(--bd);border-radius:var(--rs);cursor:pointer;text-align:center;font-size:11px;color:var(--t2);line-height:1.3;user-select:none;transition:all .13s}
.lo:hover{border-color:var(--ac);background:var(--al)}
.lo.sel{border-color:var(--ac);background:var(--al);color:var(--ac);font-weight:500}
.lo-n{font-size:15px;font-weight:700;font-family:'Noto Serif KR',serif;color:var(--tm);line-height:1}
.lo.sel .lo-n{color:var(--ac)}
.scale-ends{display:flex;justify-content:space-between;font-size:11px;color:var(--tm);padding:0 2px;margin-bottom:5px}
/* text input */
.ti{width:100%;border:1.5px solid var(--bd);border-radius:var(--rs);padding:10px 11px;font-family:'Noto Sans KR',sans-serif;font-size:13.5px;color:var(--t1);background:var(--sf);outline:none;transition:border-color .13s}
.ti:focus{border-color:var(--ac)}
.next-sec-btn{margin-top:14px;width:100%;padding:13px;background:var(--ac);color:#fff;border:none;border-radius:var(--rs);font-family:'Noto Sans KR',sans-serif;font-size:14.5px;font-weight:600;cursor:pointer;transition:background .13s}
.next-sec-btn:hover{background:var(--ah)}
.back-btn{margin-top:8px;width:100%;padding:10px;background:var(--s2);color:var(--t2);border:1px solid var(--bd);border-radius:var(--rs);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;transition:background .13s}
.back-btn:hover{background:var(--bd)}
/* intro */
.intro-card{background:var(--sf);border-radius:var(--r);border:1px solid var(--bd);padding:28px 20px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.intro{text-align:center;padding:8px 0 4px}
.intro-ic{width:52px;height:52px;background:var(--ac);border-radius:13px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px}
.intro-ic svg{width:28px;height:28px;fill:none;stroke:#fff;stroke-width:1.8}
.intro h1{font-family:'Noto Serif KR',serif;font-size:21px;font-weight:700;margin-bottom:8px;letter-spacing:-.5px;line-height:1.4}
.intro-sub{font-size:13.5px;color:var(--t2);line-height:1.8;max-width:380px;margin:0 auto 20px}
.chips{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:16px}
.chip{padding:3px 10px;background:var(--s2);border:1px solid var(--bd);border-radius:20px;font-size:11.5px;color:var(--t2)}
.tnote{font-size:12.5px;color:var(--tm);margin-bottom:18px}
.start-btn{background:var(--ac);color:#fff;border:none;border-radius:var(--rs);padding:13px 30px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:background .13s}
.start-btn:hover{background:var(--ah)}
.id-field{text-align:left;max-width:340px;margin:0 auto 20px}
.id-label{font-size:12.5px;font-weight:600;color:var(--t2);display:block;margin-bottom:5px}
.id-err{font-size:11.5px;color:var(--wn);margin-top:4px;display:none}
/* result */
.res-page{background:var(--sf);border-radius:var(--r);border:1px solid var(--bd);padding:22px 18px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.res-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid var(--t1)}
.res-hdr h2{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;letter-spacing:-.4px}
.res-date{font-size:11px;color:var(--tm);margin-top:2px}
.res-id{font-size:12px;color:var(--t2)}
.scores-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.sc{background:var(--s2);border-radius:var(--rs);padding:11px 12px;border:1px solid var(--bd)}
.sc.full{grid-column:1/-1}
.sc-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t2);margin-bottom:3px}
.sc-top{display:flex;align-items:baseline;gap:5px;margin-bottom:3px}
.sc-score{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:700;color:var(--t1);line-height:1}
.sc-max{font-size:10.5px;color:var(--tm)}
.sc-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;margin-left:auto}
.b-low{background:#EAF4EE;color:#2E7D4A}.b-mild{background:#FBF5E6;color:#8A6300}
.b-mod{background:#FBF0E6;color:#A0470A}.b-sev{background:#FCEAEA;color:#A02020}
.sbar{height:4px;background:rgba(0,0,0,.08);border-radius:2px;overflow:hidden;margin-bottom:5px}
.sfill{height:100%;border-radius:2px;transition:width .7s cubic-bezier(.4,0,.2,1) .1s}
.c-low{background:#5A9E6F}.c-mild{background:#D4A843}.c-mod{background:#D47343}.c-sev{background:#C4432E}
.sc-interp{font-size:11px;color:var(--t1);background:rgba(255,255,255,.75);border-radius:4px;padding:4px 7px;margin-bottom:4px;line-height:1.55}
.sub-row{display:grid;gap:3px;margin-top:5px}
.si{background:var(--sf);border-radius:4px;padding:4px 6px;text-align:center}
.si-n{font-size:9px;color:var(--tm);line-height:1.2;margin-bottom:1px}
.si-v{font-size:11.5px;font-weight:700;color:var(--t1)}
/* sub-domain bar rows */
.domain-rows{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.dr{display:flex;align-items:center;gap:7px;font-size:11px}
.dr-lbl{width:72px;color:var(--t2);flex-shrink:0;font-size:10.5px;line-height:1.3}
.dr-bar-bg{flex:1;height:6px;background:rgba(0,0,0,.08);border-radius:3px;overflow:hidden}
.dr-bar-fill{height:100%;border-radius:3px;transition:width .7s ease .1s}
.dr-val{width:28px;text-align:right;font-weight:700;font-size:11px;color:var(--t1);flex-shrink:0}
.res-disc{margin-top:11px;padding:9px 12px;background:var(--s2);border-radius:var(--rs);font-size:11.5px;color:var(--t2);line-height:1.7;border-left:3px solid var(--bd)}
.alert-box{background:#FFFBF0;border:1px solid #E8D9A0;border-radius:var(--rs);padding:9px 12px;margin-bottom:9px;font-size:12px;color:#7A6200;line-height:1.8}
.print-row{display:flex;gap:8px;margin-top:10px}
.pbtn{flex:1;padding:10px;border:1px solid var(--bd);border-radius:var(--rs);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;background:var(--s2);color:var(--t2);font-weight:500}
.pbtn:hover{background:var(--bd)}
.pbtn.prim{background:var(--ac);color:#fff;border-color:var(--ac)}
.pbtn.prim:hover{background:var(--ah)}
@media(max-width:480px){
  .lg5{grid-template-columns:repeat(3,1fr)}
  .scores-grid{grid-template-columns:1fr}
  .sub-row{grid-template-columns:repeat(2,1fr)!important}
}
@media print{
  body{background:white}.shell{padding:0 8px}
  .hdr,.prog,.back-btn,.next-sec-btn,.print-row{display:none!important}
  .res-page{box-shadow:none;border:1px solid #ccc}
}
</style>
</head>
<body>
<div class="shell">
<header class="hdr">
  <div class="hdr-mk"><svg viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <div><h1>정신건강 사전 설문</h1><p>정신건강의학과 진료 사전 평가 — 파트 8</p></div>
</header>
<div id="progWrap" style="display:none" class="prog">
  <div class="prog-row"><span class="prog-lbl" id="progLbl"></span><span class="prog-fr" id="progFr"></span></div>
  <div class="prog-tr"><div class="prog-fi" id="progFi" style="width:0%"></div></div>
</div>
<div id="app"></div>
</div>

<script>
// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
const S = { sec:0 };
const DATA = { ans:{}, txt:{} };
const SECS = [
  {id:'ctq',  lbl:'아동기 외상 경험 (CTQ-SF)'},
  {id:'wurs', lbl:'아동기 ADHD 관련 성향 (WURS-25)'},
];
let QS = [];
let DONE = new Set();
const ga = k => DATA.ans[k];
const gt = k => DATA.txt[k] || '';
const sa = (k,v) => { DATA.ans[k]=v; };
const st = (k,v) => { DATA.txt[k]=v; };

// ══════════════════════════════════════
// DOM HELPERS
// ══════════════════════════════════════
function el(tag,props={},...ch){
  const e=document.createElement(tag);
  for(const [k,v] of Object.entries(props)){
    if(k==='class')e.className=v;
    else if(k==='style')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2),v);
    else e.setAttribute(k,v);
  }
  for(const c of ch){ if(c==null)continue; e.appendChild(typeof c==='string'?document.createTextNode(c):c); }
  return e;
}
const d=(cls,...ch)=>el('div',{class:cls},...ch);
const p=(cls,txt)=>el('p',{class:cls},txt);
const sp=(cls,txt)=>el('span',{class:cls},txt);

// ══════════════════════════════════════
// QUESTION ENGINE
// ══════════════════════════════════════
function initSection(id){ QS=[]; DONE=new Set(); if(id==='ctq')buildCTQ(); else if(id==='wurs')buildWURS(); }
function addQ(q){ QS.push({required:true,...q}); }
function visibleQs(){ return QS; }

function answered(key){
  DONE.add(key);
  setTimeout(()=>{ repaint(); scrollToFirst(); }, 260);
}

function repaint(){
  const app=document.getElementById('app');
  const sy=window.scrollY;
  app.innerHTML='';
  const hdr=buildSecHdr(SECS[S.sec].id);
  if(hdr)app.appendChild(hdr);
  let firstActive=true;
  for(const q of QS){
    const isDone=DONE.has(q.key);
    const card=buildCard(q,isDone,firstActive&&!isDone);
    if(!isDone&&firstActive)firstActive=false;
    app.appendChild(card);
  }
  const nav=d('');
  const allDone=QS.every(q=>DONE.has(q.key));
  if(allDone){
    const isLast=S.sec===SECS.length-1;
    nav.appendChild(el('button',{class:'next-sec-btn',onclick:()=>{
      if(isLast){showResult();}
      else{S.sec++;initSection(SECS[S.sec].id);repaint();window.scrollTo(0,0);}
    }},isLast?'결과 보기 →':'다음 섹션으로 →'));
  }
  if(S.sec>0){ nav.appendChild(el('button',{class:'back-btn',onclick:()=>{ S.sec--;initSection(SECS[S.sec].id);repaint();window.scrollTo(0,0); }},'← 이전 섹션')); }
  app.appendChild(nav);
  document.getElementById('progWrap').style.display='block';
  document.getElementById('progFi').style.width=Math.round(S.sec/SECS.length*100)+'%';
  document.getElementById('progLbl').textContent=SECS[S.sec].lbl;
  document.getElementById('progFr').textContent=`${S.sec+1} / ${SECS.length}`;
  window.scrollTo(0,sy);
}

function scrollToFirst(){
  const f=document.querySelector('.q-card.active');
  if(f)f.scrollIntoView({behavior:'smooth',block:'center'});
}

function buildCard(q,isDone,isActive){
  const card=d('q-card');
  if(isDone){
    card.classList.add('done');
    const row=d('done-row');
    row.appendChild(sp('done-num',String(q.num)+'.'));
    row.appendChild(sp('done-q',q.text));
    row.appendChild(sp('done-a',q.answerLabel?q.answerLabel():'✓'));
    row.appendChild(el('button',{class:'edit-btn',onclick:e=>{e.stopPropagation();editQ(q.key);}},'수정'));
    card.appendChild(row);
    return card;
  }
  if(!isActive){ card.classList.add('future'); return card; }
  card.classList.add('active');
  card.dataset.qkey=q.key;
  const lbl=d('q-lbl');
  lbl.appendChild(sp('q-num',String(q.num)+'.'));
  lbl.appendChild(document.createTextNode(q.text));
  card.appendChild(lbl);
  card.appendChild(q.buildControl());
  return card;
}

function editQ(key){
  DONE.delete(key);
  const idx=QS.findIndex(q=>q.key===key);
  QS.slice(idx+1).forEach(q=>DONE.delete(q.key));
  repaint();
  setTimeout(()=>{ const c=document.querySelector(`.q-card.active[data-qkey="${key}"]`); if(c)c.scrollIntoView({behavior:'smooth',block:'center'}); },50);
}

// ══════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════
// CTQ: 1-5 점
function mkLikert5ctq(key){
  const lbls=['아니다','거의\n아니다','보통','조금\n그랬다','항상\n그랬다'];
  const wrap=d('');
  const ends=d('scale-ends');
  ends.appendChild(el('span',{},'아니다 (1)'));
  ends.appendChild(el('span',{},'항상 그랬다 (5)'));
  wrap.appendChild(ends);
  const g=d('lg5');
  for(let v=1;v<=5;v++){
    const o=d('lo'+(ga(key)===v?' sel':''));
    o.onclick=()=>{ sa(key,v); g.querySelectorAll('.lo').forEach(x=>x.classList.remove('sel')); o.classList.add('sel'); answered(key); };
    o.appendChild(el('span',{class:'lo-n'},String(v)));
    o.appendChild(el('span',{},lbls[v-1].replace(/\n/g,'\n')));
    g.appendChild(o);
  }
  wrap.appendChild(g);
  return wrap;
}

// Childhood temperament: 0-4 점
function mkLikert5temp(key){
  const lbls=['전혀\n아니다','약간\n그렇다','어느 정도\n그렇다','상당히\n그렇다','매우\n그렇다'];
  const wrap=d('');
  const ends=d('scale-ends');
  ends.appendChild(el('span',{},'전혀 아니다 (0)'));
  ends.appendChild(el('span',{},'매우 그렇다 (4)'));
  wrap.appendChild(ends);
  const g=d('lg5');
  for(let v=0;v<=4;v++){
    const o=d('lo'+(ga(key)===v?' sel':''));
    o.onclick=()=>{ sa(key,v); g.querySelectorAll('.lo').forEach(x=>x.classList.remove('sel')); o.classList.add('sel'); answered(key); };
    o.appendChild(el('span',{class:'lo-n'},String(v)));
    o.appendChild(el('span',{},lbls[v].replace(/\n/g,'\n')));
    g.appendChild(o);
  }
  wrap.appendChild(g);
  return wrap;
}

// ══════════════════════════════════════
// SECTION HEADERS
// ══════════════════════════════════════
function buildSecHdr(id){
  const hdr=d('sec-hdr');
  if(id==='ctq'){
    hdr.appendChild(p('eyebrow','01 / 아동기 외상'));
    hdr.appendChild(el('h2',{class:'sec-title'},'CTQ-SF — 아동기 외상 경험 선별 검사 (28문항)'));
    hdr.appendChild(p('sec-desc','만 18세 이전에 부모님 혹은 다른 가족 구성원들과의 사이에서 겪었던 경험에 대한 질문입니다.'));
    const g=d('guide-box');
    g.innerHTML='<strong>1</strong> 아니다 &nbsp; <strong>2</strong> 거의 아니다 &nbsp; <strong>3</strong> 보통 &nbsp; <strong>4</strong> 조금 그랬다 &nbsp; <strong>5</strong> 항상 그랬다';
    hdr.appendChild(g);
  } else {
    hdr.appendChild(p('eyebrow','02 / 아동기 ADHD 관련 성향'));
    hdr.appendChild(el('h2',{class:'sec-title'},'WURS-25 — 아동기 성향 회상 척도 (25문항)'));
    hdr.appendChild(p('sec-desc','어렸을 때(18세 이전) 어떠했는지를 떠올리며 답변해 주십시오. 각 문항이 나의 아동기 모습에 얼마나 해당하는지 선택해 주세요.'));
    const g=d('guide-box');

// SCORING
// ══════════════════════════════════════

// CTQ-SF 역채점 헬퍼
function ctqR(n){ return 6-(ga(`ctq${n}`)??1); }
function ctqV(n){ return ga(`ctq${n}`)??1; }

function scoreCTQ(){
  const EA = ctqV(3)+ctqV(8)+ctqV(14)+ctqV(18)+ctqV(25);
  const PA = ctqV(9)+ctqV(11)+ctqV(12)+ctqV(15)+ctqV(17);
  const SA = ctqV(20)+ctqV(21)+ctqV(23)+ctqV(24)+ctqV(27);
  const EN = ctqR(5)+ctqR(7)+ctqR(13)+ctqR(19)+ctqR(28);
  const PN = ctqV(1)+ctqR(2)+ctqV(4)+ctqV(6)+ctqR(26);
  const clinical = EA+PA+SA+EN+PN;
  // Minimization/Denial: item10,16,22가 5점이면 각 1점
  const MD = ((ga('ctq10')??1)===5?1:0)+((ga('ctq16')??1)===5?1:0)+((ga('ctq22')??1)===5?1:0);
  return{EA,PA,SA,EN,PN,clinical,MD};
}

function ctqCutoff(dk,score){
  // Bernstein & Fink 기준 (문서 확정)
  const CUT={
    EA:{none:8,  mild:12, mod:15},  // None ≤8, Low 9-12, Mod 13-15, Sev ≥16
    PA:{none:7,  mild:9,  mod:12},  // None ≤7, Low 8-9,  Mod 10-12, Sev ≥13
    SA:{none:5,  mild:7,  mod:12},  // None =5, Low 6-7,  Mod 8-12,  Sev ≥13
    EN:{none:9,  mild:14, mod:17},  // None ≤9, Low 10-14,Mod 15-17, Sev ≥18
    PN:{none:7,  mild:9,  mod:12},  // None ≤7, Low 8-9,  Mod 10-12, Sev ≥13
  };
  const c=CUT[dk];
  if(score>c.mod)   return{lbl:'심각',   cls:'b-sev', fcls:'c-sev'};
  if(score>c.mild)  return{lbl:'중등도', cls:'b-mod', fcls:'c-mod'};
  if(score>c.none)  return{lbl:'경미',   cls:'b-mild',fcls:'c-mild'};
  return                  {lbl:'없음/최소',cls:'b-low',fcls:'c-low'};
}

function scoreWURS(){
  let total=0;
  for(let i=1;i<=25;i++) total+=(ga(`w${i}`)??0);
  // 3요인 소척도 (NovoPsych)
  const DMB=[5,6,8,10,12,13,14,18,19,21,22];
  const IH=[1,3,4,7,15,16,23,24,25];
  const DA=[2,9,11,17];
  let dmb=0,ih=0,da=0;
  DMB.forEach(i=>dmb+=(ga(`w${i}`)??0));
  IH.forEach(i=>ih+=(ga(`w${i}`)??0));
  DA.forEach(i=>da+=(ga(`w${i}`)??0));
  const dmb_mean=Math.round(dmb/11*10)/10;
  const ih_mean =Math.round(ih/9*10)/10;
  const da_mean =Math.round(da/4*10)/10;
  return{total,dmb,ih,da,dmb_mean,ih_mean,da_mean};
}

  // Dominant domain
  const domEntries=Object.entries(ctqDom);
  const domMax=domEntries.reduce((a,b)=>{ const ca=ctqCutoff(a[0],a[1]); const cb=ctqCutoff(b[0],b[1]); const lvl={'없음/최소':0,경미:1,중등도:2,심각:3}; return (lvl[ca.lbl]||0)>=(lvl[cb.lbl]||0)?a:b; });
  const domInfo=CTQ_DOMAINS[domMax[0]];

    row.appendChild(bg);
    const valWrap=d('');valWrap.style.cssText='display:flex;gap:4px;align-items:center;flex-shrink:0';
    valWrap.appendChild(el('span',{class:'dr-val'},String(v)));

    domRows.appendChild(row);

    {name:'정서/행동 조절',  raw:dmb, max:44, mean:dmb_mean, col:'#C4432E',
     note:'분노·반항·행동조절 문제'},

    {name:'우울/불안',       raw:da,  max:16, mean:da_mean,  col:'#6B7CC4',

  wDoms.forEach(({name,raw,max,mean,col,note})=>{
    const row=d('dr');

  // CTQ alert
  const ctqDomMap={EA:ctqRes.EA,PA:ctqRes.PA,SA:ctqRes.SA,EN:ctqRes.EN,PN:ctqRes.PN};
  const ctqNames={EA:'정서적 학대',PA:'신체적 학대',SA:'성적 학대',EN:'정서적 방임',PN:'신체적 방임'};
  Object.entries(ctqDomMap).forEach(([dk,v])=>{
    const lv=ctqCutoff(dk,v);
    if(lv.lbl==='심각'||lv.lbl==='중등도') flags.push(`${ctqNames[dk]} ${lv.lbl}`);
  });
  if(ctqRes.MD>=2) flags.push(`과소보고 지표 ${ctqRes.MD}/3 (결과 해석 시 주의)`);
  if(wT>=36) flags.push(`WURS-25 ${wT}점 (${wBadge})`);
  if(flags.length){
    const ab=d('alert-box');
    ab.innerHTML=`<strong style="display:block;margin-bottom:3px">📋 임상적 주의 항목</strong>${flags.join(' &nbsp;·&nbsp; ')}`;
    page.appendChild(ab);
  }

  const disc=d('res-disc');
  disc.innerHTML='본 결과는 <strong>선별 목적의 참고 자료</strong>이며, 진단을 의미하지 않습니다. 아동기 외상 및 발달사는 반드시 담당 정신건강의학과 전문의의 면담을 통해 종합적으로 평가되어야 합니다.';
  page.appendChild(disc);

  // ── HUB: broadcast scores ──
  (function(){
    const{EA,PA,SA,EN,PN,clinical,MD}=scoreCTQ();
    const{total:wT,dmb,ih,da}=scoreWURS();
    const ctqLvl = clinical>=40?'severe':clinical>=25?'mod':clinical>=15?'mild':'normal';
    const wursLvl = wT>=36?'warn':wT>=25?'mild':'normal';
    const payload={type:'SURVEY_SCORES',surveyId:'survey8',scores:[
      {id:'ctq', name:'아동기 외상 (CTQ-SF)', score:clinical, max:125, level:ctqLvl,
       badge:clinical>=40?'심각':clinical>=25?'중등도':clinical>=15?'경미':'없음/최소',
       sub:[
         {n:'정서적 학대',v:EA+'/25'},{n:'신체적 학대',v:PA+'/25'},
         {n:'성적 학대',v:SA+'/25'},{n:'정서적 방임',v:EN+'/25'},
         {n:'신체적 방임',v:PN+'/25'}
       ]},
      {id:'wurs', name:'아동기 ADHD 성향 (WURS-25)', score:wT, max:100, level:wursLvl,
       badge:wT>=36?'양성 (≥36)':wT>=25?'경계':' 음성',
       sub:[{n:'주의력결핍·기분',v:dmb},{n:'충동·과잉행동',v:ih},{n:'불안·학업',v:da}]},
    ]};
    if(window.parent!==window) window.parent.postMessage(payload,'*');
    try{ localStorage.setItem('hub_scores_survey8', JSON.stringify(payload)); }catch(e){}
  })();
  const pr=d('print-row');
  pr.appendChild(el('button',{class:'pbtn prim',onclick:()=>window.print()},'🖨  결과 인쇄'));
  pr.appendChild(el('button',{class:'pbtn',onclick:()=>{DATA.ans={};DATA.txt={};S.sec=0;startApp();}},'↩  처음으로'));
  pr.appendChild(el('button',{class:'pbtn',style:'background:var(--al);border-color:var(--ac);color:var(--ah);font-weight:600',onclick:()=>{ if(window.parent!==window){window.parent.postMessage({type:'BACK_TO_HUB'},'*');}else{window.location.href='index.html';} }},'🏠  목록으로 돌아가기'));
  page.appendChild(pr);
  app.appendChild(page);
}

// ══════════════════════════════════════
// APP ENTRY
// ══════════════════════════════════════
function startApp(){
  const app=document.getElementById('app');
  app.innerHTML='';
  document.getElementById('progWrap').style.display='none';
  const c=d('intro-card');
  const intro=d('intro');
  const ic=d('intro-ic');
  ic.innerHTML=`<svg viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  intro.appendChild(ic);
  intro.appendChild(el('h1',{},'정신건강의학과\n사전 평가 설문'));
  intro.appendChild(p('intro-sub','아동기 외상 경험(CTQ-SF)과 아동기 ADHD 관련 성향(WURS-25)에 관한 사전 평가 파트입니다. 솔직하게 답변해 주실수록 더 정확한 평가에 도움이 됩니다.'));
  const chips=d('chips');
  ['아동기 외상 (CTQ-SF 28문항)','WURS-25 (아동기 성향 25문항)'].forEach(t=>chips.appendChild(sp('chip',t)));
  intro.appendChild(chips);
  intro.appendChild(p('tnote','⏱ 예상 소요 시간: 약 10–15분'));
  const idF=d('id-field');
  idF.appendChild(el('label',{class:'id-label'},'고유 ID (이니셜+생년월일, 예: HGD070229)'));
  const idI=el('input',{class:'ti',type:'text',placeholder:'예: HGD070229',maxlength:'20'});
  idI.value=gt('uid'); idI.oninput=()=>st('uid',idI.value.trim()); idF.appendChild(idI);
  const idE=p('id-err','ID를 입력해 주세요.'); idF.appendChild(idE); intro.appendChild(idF);
  intro.appendChild(el('button',{class:'start-btn',onclick:()=>{
    if(!gt('uid')){idE.style.display='block';idI.focus();return;}
    idE.style.display='none';
    S.sec=0; initSection(SECS[0].id); repaint(); window.scrollTo(0,0);
  }},'설문 시작하기'));
  c.appendChild(intro); app.appendChild(c);
}

startApp();
</script>
